<!DOCTYPE html>
<html>
<head>
  <title>User Data</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #333;
    }

    h1 {
      text-align: center;
      color: white;
      padding: 20px;
    }

    #container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      width: 230px;
      background: white;
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      transition: 0.3s;
      cursor: pointer;
      position: relative;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.3);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .gender {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 20px;
    }

    /* DETAIL PAGE */
    .detail {
      width: 350px;
      margin: 30px auto;
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: left;
    }

    .detail img {
      width: 100%;
      border-radius: 10px;
    }

    .detail h2 {
      text-align: center;
      margin: 10px 0;
    }

    .section {
      margin-top: 15px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 10px;
    }

    .section p {
      margin: 5px 0;
    }

    button {
      display: block;
      margin: 20px auto 0;
      padding: 10px 20px;
      border: none;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>

</head>
<body>

<h1>🌟 User Profiles</h1>

<div id="container"></div>

<script>
const container = document.getElementById("container");

async function fetchuserdata(){
  try{
    const response = await fetch('https://dummyjson.com/users');
    const result = await response.json();

    displayData(result.users);
  }catch(e){
    console.error(e);
  }
}

function displayData(users){
  container.innerHTML = "";

  users.forEach(user => {

    const genderIcon = user.gender === "male" ? "👦" : "👧";

    const card = document.createElement("div");
    card.classList.add("card");

    card.innerHTML = `
      <span class="gender">${genderIcon}</span>
      <img src="${user.image}">
      <h3>${user.firstName} ${user.lastName}</h3>
      <p>${user.email}</p>
    `;

    card.onclick = () => showDetails(user);

    container.appendChild(card);
  });
}

// DETAIL VIEW
function showDetails(user){
  container.innerHTML = "";

  const detail = document.createElement("div");
  detail.classList.add("detail");

  detail.innerHTML = `
    <img src="${user.image}">
    <h2>${user.firstName} ${user.lastName}</h2>

    <div class="section">
      <p><b>👤 Username:</b> ${user.username}</p>
      <p><b>📧 Email:</b> ${user.email}</p>
      <p><b>📱 Phone:</b> ${user.phone}</p>
    </div>

    <div class="section">
      <p><b>🎂 Age:</b> ${user.age}</p>
      <p><b>⚧ Gender:</b> ${user.gender}</p>
      <p><b>📅 Birth Date:</b> ${user.birthDate}</p>
    </div>

    <div class="section">
      <p><b>🏠 City:</b> ${user.address.city}</p>
      <p><b>🌍 State:</b> ${user.address.state}</p>
      <p><b>🌎 Country:</b> ${user.address.country}</p>
    </div>

    <button onclick="fetchuserdata()">⬅ Back</button>
  `;

  container.appendChild(detail);
}

fetchuserdata();
</script>

</body>
</html>
